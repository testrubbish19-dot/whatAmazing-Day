<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活老虎機</title>
    
    <!-- PWA 圖標與設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 這裡預設了一個漂亮的 Emoji 圖標 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
    <meta name="theme-color" content="#333333">

    <style>
        /* 保持原本的 CSS，增加一點視覺回饋 */
               body { 
            font-family: -apple-system, system-ui, sans-serif; 
            /* --- 新增背景設定 --- */
            background-image: url('background.jpg'); 
            background-size: cover;      
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            /* ------------------ */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            -webkit-user-select: none; 
        }

        /* 建議同時新增這個，確保文字在你的畫作上清晰可見 */
        .slot-box { 
            background: rgba(255, 255, 255, 0.9); /* 讓格子帶點透明，隱約看見背景 */
            backdrop-filter: blur(5px);           /* 增加磨砂玻璃質感 */
            height: 100px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-radius: 12px; 
            text-align: center; 
            padding: 5px; 
            border: 1px solid #ccc; 
        }
        .mode-selector { display: flex; gap: 8px; margin: 20px 0; width: 100%; max-width: 500px; }
        .mode-selector button { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #ddd; cursor: pointer; transition: 0.2s; }
        .mode-selector button.active { background: #ff4757; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }
        .slot-machine { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-width: 500px; width: 100%; box-sizing: border-box; }
        .slot-box { background: white; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; text-align: center; padding: 5px; border: 1px solid #ccc; }
        .slot-label { font-size: 10px; color: #999; margin-bottom: 4px; font-weight: bold; }
        .slot-content { font-weight: 800; color: #333; font-size: 13px; line-height: 1.2; }
        #spin-btn { margin-top: 40px; width: 80%; max-width: 300px; padding: 18px; font-size: 22px; border: none; border-radius: 50px; background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; font-weight: bold; box-shadow: 0 6px 20px rgba(40,167,69,0.4); cursor: pointer; }
        #spin-btn:active { transform: scale(0.95); }
        .rolling { filter: blur(2px); transform: translateY(2px); transition: 0.05s; }
    </style>
</head>
<body>

<h2 style="color:#333;">🎰 生活隨機老虎機</h2>


<div class="mode-selector">
    <button onclick="changeMode('one')" id="btn-one" class="active">一人</button>
    <button onclick="changeMode('two')" id="btn-two">二人</button>
    <button onclick="changeMode('many')" id="btn-many">三人+</button>
</div>

<div class="slot-machine">
    <div class="slot-box"><div class="slot-label">穿搭顏色</div><div class="slot-content" id="slot-0">?</div></div>
    <div class="slot-box"><div class="slot-label">飲水容量</div><div class="slot-content" id="slot-1">?</div></div>
    <div class="slot-box"><div class="slot-label">熱身時間</div><div class="slot-content" id="slot-2">?</div></div>
    <div class="slot-box"><div class="slot-label">活動 1</div><div class="slot-content" id="slot-3">?</div></div>
    <div class="slot-box"><div class="slot-label">活動 2</div><div class="slot-content" id="slot-4">?</div></div>
    <div class="slot-box"><div class="slot-label">活動 3</div><div class="slot-content" id="slot-5">?</div></div>
    <div class="slot-box"><div class="slot-label">菜式</div><div class="slot-content" id="slot-6">?</div></div>
    <div class="slot-box"><div class="slot-label">拍照</div><div class="slot-content" id="slot-7">?</div></div>
    <div class="slot-box"><div class="slot-label">聽歌</div><div class="slot-content" id="slot-8">?</div></div>
</div>

<button id="spin-btn" onclick="spin()">拉動手掣！</button>

<script>
    let currentMode = 'one';
    // 這裡使用瀏覽器內建的 Web Audio API 生成音效，不需外連 MP3
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
        });
    }

    // 數據包與之前相同（簡化顯示）
    const data = {
        colors: ["紅", "橙", "黃", "綠", "青", "藍", "紫", "黑", "白", "灰", "粉紅"],
        water: ["500ml up", "750ml up", "1000ml up"],
        warmup: ["10-30mins", "15mins up", "20mins up", "25mins up", "30mins up"],
        cuisine: ["中式", "日式", "韓式", "泰式", "越式", "印度", "意式", "美式", "法式", "西班牙"],
        photo: Array.from({length: 10}, (_, i) => `${i + 1} 張`),
        music: ["1 up", "2 up", "3 up", "4 up", "5 up"],
        one: ["睇Netflix", "聽Podcast", "睇書", "寫日記", "畫畫", "居家健身", "散步", "行山", "跑步", "冥想", "砌LEGO"],
        two: ["睇戲", "打機", "煮飯", "去咖啡店", "打邊爐", "唱K", "行街", "做運動", "影相", "露營"],
        many: ["打邊爐", "燒烤", "唱K", "Party Game", "狼人殺", "主題樂園", "野餐", "密室逃脱", "交換禮物"]
    };

    function changeMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function spin() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        const boxes = document.querySelectorAll('.slot-content');
        
        let counts = 0;
        let speed = 50;
        
        const roll = setInterval(() => {
            playTickSound();
            document.getElementById('slot-0').innerText = data.colors[Math.floor(Math.random()*data.colors.length)];
            document.getElementById('slot-1').innerText = data.water[Math.floor(Math.random()*data.water.length)];
            document.getElementById('slot-2').innerText = data.warmup[Math.floor(Math.random()*data.warmup.length)];
            document.getElementById('slot-3').innerText = data[currentMode][Math.floor(Math.random()*data[currentMode].length)];
            document.getElementById('slot-4').innerText = data[currentMode][Math.floor(Math.random()*data[currentMode].length)];
            document.getElementById('slot-5').innerText = data[currentMode][Math.floor(Math.random()*data[currentMode].length)];
            document.getElementById('slot-6').innerText = data.cuisine[Math.floor(Math.random()*data.cuisine.length)];
            document.getElementById('slot-7').innerText = data.photo[Math.floor(Math.random()*data.photo.length)];
            document.getElementById('slot-8').innerText = data.music[Math.floor(Math.random()*data.music.length)];
            
            boxes.forEach(b => b.classList.add('rolling'));
            
            counts++;
            if (counts > 20) {
                clearInterval(roll);
                btn.disabled = false;
                boxes.forEach(b => b.classList.remove('rolling'));
                playWinSound(); // 結束音效
            }
        }, speed);
    }
</script>
</body>
</html>
